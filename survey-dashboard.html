<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Analytics</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --n1:#f7f7f7;--n2:#efefef;--n3:#e3e3e3;--n4:#d0d0d0;--n5:#b0b0b0;--n7:#686868;--n8:#484848;--n9:#282828;
  --b1:#e8f0fe;--b5:#4880f0;--b6:#2563e8;--b7:#1a4fd6;--b8:#1340b8;
  --do1:#fff0ed;--do6:#d44d2e;--do7:#b33520;
  --g1:#e8f5e9;--g6:#43a047;--g7:#2e7d32;
  --y1:#fffde7;--y7:#c6a600;--y8:#8d7200;
  --bg:#fff;--bg-sub:var(--n1);--bg-ho:var(--n2);--bd:var(--n3);
  --tx:var(--n9);--tx2:var(--n7);--tx3:var(--n5);
  --pri:var(--b6);--pri-bg:var(--b1);--pri-ho:var(--b7);
  --ok:var(--g6);--ok-bg:var(--g1);--ok-tx:var(--g7);
  --wa:var(--y7);--wa-bg:var(--y1);--wa-tx:var(--y8);
  --er:var(--do6);--er-bg:var(--do1);--er-tx:var(--do7);
  --sb:216px;--tb:52px;
  --f:system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
  --m:'JetBrains Mono',monospace;
  --r:8px;--rc:10px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 0 0 1px var(--bd);
}
html,body{height:100%;font-family:var(--f);background:var(--bg-sub);color:var(--tx);-webkit-font-smoothing:antialiased;}
button{font-family:var(--f);cursor:pointer;}

/* ══ LOGIN PAGE ══ */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg-sub);
  background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);
  background-size:40px 40px;
}
.login-card{
  background:var(--bg);border:1px solid var(--bd);border-radius:12px;
  padding:32px 28px;width:340px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
}
.login-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.login-dot{width:8px;height:8px;border-radius:50%;background:var(--pri);}
.login-name{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.01em;}
.login-badge{font-size:10px;font-weight:600;padding:2px 6px;background:var(--pri-bg);color:var(--pri);border-radius:4px;margin-left:auto;}
.login-title{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--tx2);margin-bottom:24px;}
.login-label{font-size:12px;font-weight:500;color:var(--tx2);display:block;margin-bottom:6px;}
.login-input{
  width:100%;height:38px;padding:0 12px;
  border:1px solid var(--bd);border-radius:var(--r);
  font-size:13px;font-family:var(--f);color:var(--tx);
  background:var(--bg);transition:border-color .15s,box-shadow .15s;
}
.login-input:focus{outline:none;border-color:var(--b5);box-shadow:0 0 0 3px var(--pri-bg);}
.login-err{
  font-size:12px;color:var(--er);margin-top:8px;
  display:none;align-items:center;gap:5px;
}
.login-err.show{display:flex;}
.login-btn{
  width:100%;height:38px;margin-top:20px;
  background:var(--pri);color:#fff;border:none;border-radius:var(--r);
  font-size:13px;font-weight:500;transition:background .15s;
}
.login-btn:hover{background:var(--pri-ho);}
.login-btn:active{background:var(--b8);}
.login-hint{font-size:11px;color:var(--tx3);text-align:center;margin-top:16px;}

/* ══ LOADING ══ */
.loading-wrap{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  z-index:999;
}
.loading-spinner{
  width:32px;height:32px;border:2.5px solid var(--n3);
  border-top-color:var(--pri);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--tx2);}

/* ══ APP SHELL ══ */
.app{display:flex;height:100vh;overflow:hidden;}
.sb{width:var(--sb);flex-shrink:0;background:var(--bg);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{height:var(--tb);display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid var(--bd);flex-shrink:0;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--pri);}
.logo-tx{font-size:13px;font-weight:700;color:var(--tx);letter-spacing:-.02em;}
.logo-badge{margin-left:auto;font-size:10px;font-weight:600;padding:2px 6px;background:var(--pri-bg);color:var(--pri);border-radius:4px;}
.sb-logout{margin-left:4px;background:none;border:none;color:var(--tx3);font-size:10px;cursor:pointer;padding:2px 4px;border-radius:4px;}
.sb-logout:hover{background:var(--bg-ho);color:var(--tx2);}
.sb-scroll{flex:1;overflow-y:auto;padding:8px;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--n3);border-radius:2px;}
.sb-sec{padding:8px 6px 2px;}
.sb-lbl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:0 8px;margin-bottom:3px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:background .1s,color .1s;border:none;background:none;width:100%;text-align:left;}
.ni:hover{background:var(--bg-ho);color:var(--tx);}
.ni.active{background:var(--pri-bg);color:var(--pri);}
.ni svg{width:14px;height:14px;flex-shrink:0;opacity:.7;}
.ni.active svg{opacity:1;}
.breadcrumb-nav{padding:8px 14px;display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx3);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;}
.bc-link{color:var(--pri);cursor:pointer;font-weight:500;}
.bc-link:hover{text-decoration:underline;}
.bc-sep{color:var(--tx3);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:var(--tb);background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;}
.tb-title{font-size:14px;font-weight:600;color:var(--tx);}
.tb-sep{width:1px;height:14px;background:var(--bd);}

/* data source badge */
.ds-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--tx3);
  margin-left:auto;padding:4px 10px;
  border:1px solid var(--bd);border-radius:99px;
  background:var(--bg);
}
.ds-dot{width:5px;height:5px;border-radius:50%;}
.ds-dot.mock{background:var(--wa);}
.ds-dot.live{background:var(--ok);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.filters{display:flex;gap:4px;}
.fp{display:inline-flex;align-items:center;height:28px;padding:0 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-weight:500;color:var(--tx2);background:var(--bg);cursor:pointer;transition:all .1s;gap:5px;}
.fp:hover{border-color:var(--n4);color:var(--tx);}
.fp.active{background:var(--pri-bg);border-color:var(--pri);color:var(--pri);}
.fp .dot{width:6px;height:6px;border-radius:50%;}
.ml-auto{margin-left:auto;}
.dg{display:flex;gap:3px;}
.db{height:28px;padding:0 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-weight:500;color:var(--tx2);background:var(--bg);cursor:pointer;transition:all .1s;}
.db:hover{border-color:var(--n4);color:var(--tx);}
.db.active{background:var(--pri-bg);border-color:var(--pri);color:var(--pri);}
.content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--n3);border-radius:2px;}

/* cards, tables, shared components (same as before) */
.pg-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.pg-hd-l{display:flex;flex-direction:column;gap:3px;}
.pg-title{font-size:18px;font-weight:700;color:var(--tx);letter-spacing:-.02em;}
.pg-sub{font-size:13px;color:var(--tx2);}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:var(--r);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:background .12s;}
.btn-pri{background:var(--pri);color:#fff;}.btn-pri:hover{background:var(--pri-ho);}
.btn-sec{background:var(--bg);border:1px solid var(--bd);color:var(--tx2);}.btn-sec:hover{border-color:var(--n4);color:var(--tx);}
.btn-sm{height:26px;padding:0 10px;font-size:12px;}
.card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rc);overflow:hidden;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);}
.ct{font-size:13px;font-weight:600;color:var(--tx);}
.cm{font-size:11px;color:var(--tx3);}
.cb{padding:16px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.sc-row{display:grid;gap:10px;}
.sc{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rc);padding:14px 16px;display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;}
.sc-lbl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.sc-val{font-size:28px;font-weight:700;color:var(--tx);font-family:var(--m);letter-spacing:-.03em;line-height:1;}
.sc-dl{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;}
.d-up{color:var(--ok);}.d-dn{color:var(--er);}.d-nu{color:var(--tx3);}
.sc-sub{font-size:11px;color:var(--tx3);}
.sc-bar{position:absolute;bottom:0;left:0;right:0;height:3px;}
.tbadge{display:inline-flex;align-items:center;height:16px;padding:0 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.tb-nps{background:var(--b1);color:var(--b7);}
.tb-ces{background:var(--g1);color:var(--g7);}
.tb-csat{background:var(--y1);color:var(--y8);}
.status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.st-live{background:var(--ok-bg);color:var(--ok-tx);}
.st-draft{background:var(--n2);color:var(--tx2);}
.st-paused{background:var(--wa-bg);color:var(--wa-tx);}
.st-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.prod-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rc);padding:18px;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:12px;}
.prod-card:hover{border-color:var(--pri);box-shadow:0 0 0 3px var(--pri-bg);}
.prod-card-top{display:flex;align-items:center;gap:10px;}
.prod-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.prod-info{flex:1;}
.prod-name{font-size:14px;font-weight:600;color:var(--tx);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.prod-desc{font-size:12px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.prod-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:12px;border-top:1px solid var(--bd);}
.ps{display:flex;flex-direction:column;gap:1px;}
.ps-v{font-size:14px;font-weight:700;font-family:var(--m);color:var(--tx);}
.ps-l{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;}
.prod-footer{display:flex;align-items:center;justify-content:space-between;}
.prod-modules{font-size:11px;color:var(--tx2);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase;padding:9px 14px;background:var(--bg-sub);border-bottom:1px solid var(--bd);}
.tbl td{font-size:12px;color:var(--tx2);padding:10px 14px;border-bottom:1px solid var(--n2);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg-sub);}
.tbl-link{color:var(--pri);font-weight:500;cursor:pointer;}
.tbl-link:hover{text-decoration:underline;}
.spill{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;padding:0 5px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--m);}
.sp-g{background:var(--ok-bg);color:var(--ok-tx);}
.sp-a{background:var(--wa-bg);color:var(--wa-tx);}
.sp-r{background:var(--er-bg);color:var(--er-tx);}
.sp-b{background:var(--pri-bg);color:var(--b7);}
.mini-chart{display:flex;align-items:flex-end;gap:2px;height:28px;}
.mc-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;}
.kv-list{display:flex;flex-direction:column;}
.kv{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--n2);}
.kv:last-child{border-bottom:none;}
.kv-k{font-size:12px;font-weight:500;color:var(--tx3);width:140px;flex-shrink:0;}
.kv-v{font-size:12px;color:var(--tx);flex:1;}
.fb-bubble{background:var(--bg-sub);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--tx);line-height:1.6;}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;}
.tag-chip{padding:4px 10px;border:1px solid var(--bd);border-radius:99px;font-size:12px;font-weight:500;color:var(--tx2);}
.tag-chip.sel{background:var(--pri-bg);border-color:var(--pri);color:var(--pri);}
.rate-wrap{display:flex;align-items:center;gap:18px;}
.rring{position:relative;width:72px;height:72px;flex-shrink:0;}
.rring svg{width:72px;height:72px;transform:rotate(-90deg);}
.rl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--tx);font-family:var(--m);}
.rate-bd{flex:1;display:flex;flex-direction:column;gap:5px;}
.ri{display:flex;align-items:center;gap:7px;font-size:12px;}
.ri-d{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ri-n{flex:1;color:var(--tx2);font-weight:500;}
.ri-v{font-family:var(--m);font-weight:600;font-size:12px;color:var(--tx);}
.tag-bars{display:flex;flex-direction:column;gap:9px;}
.tbi{display:flex;flex-direction:column;gap:3px;}
.tbt{display:flex;justify-content:space-between;}
.tbl2{font-size:12px;font-weight:500;color:var(--tx2);}
.tbc{font-size:11px;font-weight:600;color:var(--tx3);font-family:var(--m);}
.tbtr{height:5px;background:var(--n2);border-radius:99px;overflow:hidden;}
.tbf{height:100%;border-radius:99px;width:0%;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.chart-wrap{position:relative;}
.chart-svg{width:100%;display:block;}
.chart-leg{display:flex;gap:14px;padding:8px 14px;border-top:1px solid var(--bd);}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2);font-weight:500;}
.ll{width:14px;height:2px;border-radius:1px;}
.mod-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--n2);}
.mod-row:last-child{border-bottom:none;}
.mod-n{font-size:12px;font-weight:500;color:var(--tx2);flex:1;}
.mod-p{font-size:10px;color:var(--tx3);font-family:var(--m);}
.mod-scores{display:flex;gap:5px;align-items:center;}
.msv{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:34px;}
.msv-n{font-size:13px;font-weight:700;font-family:var(--m);color:var(--tx);}
.msv-l{font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;}
.ms-sp{width:1px;height:22px;background:var(--bd);align-self:center;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--tx3);font-size:13px;gap:8px;}
@keyframes pulse2{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse2 1.8s ease-in-out infinite;flex-shrink:0;}

/* sidebar footer */
.sb-footer{
  padding:8px;border-top:1px solid var(--bd);flex-shrink:0;
  display:flex;flex-direction:column;gap:2px;
}
.sb-footer-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--tx2);
  cursor:pointer;transition:background .1s,color .1s;
  border:none;background:none;width:100%;text-align:left;
  text-decoration:none;
}
.sb-footer-btn:hover{background:var(--bg-ho);color:var(--tx);}
.sb-footer-btn svg{width:14px;height:14px;flex-shrink:0;opacity:.7;}

.skel{background:linear-gradient(90deg,var(--n2) 25%,var(--n1) 50%,var(--n2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:120px;border-radius:var(--rc);}
.skel-row{height:44px;margin-bottom:2px;}
.skel-title{height:22px;width:200px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- ══ LOGIN PAGE ══ -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-dot"></span>
        <span class="login-name">Survey Analytics</span>
        <span class="login-badge">Beta</span>
      </div>
      <p class="login-title">登入</p>
      <p class="login-sub">請輸入密碼以存取觀測後台</p>
      <label class="login-label" for="pwInput">密碼</label>
      <input class="login-input" id="pwInput" type="password"
        placeholder="請輸入密碼" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-err" id="loginErr">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><line x1="6" y1="4" x2="6" y2="6.5"/><circle cx="6" cy="8.5" r=".5" fill="currentColor"/></svg>
        密碼錯誤，請再試一次
      </div>
      <button class="login-btn" onclick="doLogin()">登入</button>
      <p class="login-hint">僅供內部使用，請勿分享此連結</p>
    </div>
  </div>
</div>

<!-- ══ LOADING ══ -->
<div id="loadingPage" style="display:none">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <p class="loading-txt">載入資料中…</p>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="appPage" style="display:none">
  <aside class="sb">
    <div class="sb-logo">
      <span class="logo-dot"></span>
      <span class="logo-tx">Survey Analytics</span>
      <span class="logo-badge">Beta</span>
    </div>
    <div id="sb-bc" style="display:none"></div>
    <div class="sb-scroll" id="sb-nav"></div>
    <div class="sb-footer">
      <a href="./index.html" class="sb-footer-btn" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        前往前台
      </a>
      <button class="sb-footer-btn" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        登出
      </button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar" id="topbar">
      <span class="tb-title" id="tb-title">產品列表</span>

  async getProducts() {
    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(400);
      return MOCK.products;
    }
    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getProducts`);
    return res.json();
  },

  async getSurveys(productId) {
    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(300);
      return MOCK.surveys[productId] || [];
    }
    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getSurveys&product=${productId}`);
    return res.json();
  },

  async getModules(productId) {
    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(300);
      return MOCK.modules[productId] || [];
    }
    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getModules&product=${productId}`);
    return res.json();
  },

  async getFeedbacks(productId) {
    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(300);
      return MOCK.feedbacks[productId] || [];
    }
    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getFeedbacks&product=${productId}`);
    return res.json();
  },

  async getTrend(productId) {
    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(200);
      return { data: MOCK.trend[productId], labels: MOCK.tlabels };
    }
    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getTrend&product=${productId}`);
    return res.json();
  },

    if (CONFIG.DATA_SOURCE === 'mock') {
      await delay(200);
      return MOCK.products.find(p => p.id === productId);

    const res = await fetch(`${CONFIG.SHEETS_URL}?action=getScore&product=${productId}`);

async function startApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('loadingPage').style.display = 'block';

  // 更新 data source badge
  const badge = document.getElementById('dsBadge');
  const dot = badge.querySelector('.ds-dot');
  const lbl = document.getElementById('dsLabel');
  if (CONFIG.DATA_SOURCE === 'mock') {
    dot.className = 'ds-dot mock';
    lbl.textContent = 'Mock API';
  } else {
    dot.className = 'ds-dot live';
    lbl.textContent = 'Google Sheets';
  }

  // 預載產品清單
  S._products = await API.getProducts();

  document.getElementById('loadingPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'flex';
  render();
}

// ══════════════════════════════════════════════
// RENDER — async 版本
// ══════════════════════════════════════════════
async function render() {
  renderSidebar();
  renderTopbar();
  const c = document.getElementById('content');

  // 顯示 skeleton 再載入資料
  if (S.page === 'products') {
    c.innerHTML = skeletonProducts();
    const products = S._products || await API.getProducts();
    S._products = products;
    c.innerHTML = pageProducts(products);
  }
  else if (S.page === 'product') {
    c.innerHTML = skeletonDetail();
    const [score, surveys, modules, feedbacks, trend] = await Promise.all([
      S._scores[S.prod]   || API.getProductScore(S.prod).then(d => { S._scores[S.prod] = d; return d; }),
      S._surveys[S.prod]  || API.getSurveys(S.prod).then(d  => { S._surveys[S.prod]  = d; return d; }),
      S._modules[S.prod]  || API.getModules(S.prod).then(d  => { S._modules[S.prod]  = d; return d; }),
      S._feedbacks[S.prod]|| API.getFeedbacks(S.prod).then(d => { S._feedbacks[S.prod]= d; return d; }),
      S._trend[S.prod]    || API.getTrend(S.prod).then(d    => { S._trend[S.prod]    = d; return d; }),
    ]);
    if      (S.sub === 'overview')   c.innerHTML = pageOverview(score, trend, modules, feedbacks);
    else if (S.sub === 'surveys')    c.innerHTML = pageSurveys(surveys);
    else if (S.sub === 'modules')    c.innerHTML = pageModules(modules);
    else if (S.sub === 'feedbacks')  c.innerHTML = pageFeedbacks(feedbacks);
    else if (S.sub === 'settings')   c.innerHTML = pageSettings(score);
  }
  else if (S.page === 'survey-detail') {
    const surveys = S._surveys[S.prod] || Object.values(MOCK.surveys).flat();
    const feedbacks = S._feedbacks[S.prod] || [];
    c.innerHTML = pageSurveyDetail(surveys, feedbacks);
  }
  else if (S.page === 'module-detail') {
    const modules = S._modules[S.prod] || [];
    const feedbacks = S._feedbacks[S.prod] || [];
    c.innerHTML = pageModuleDetail(modules, feedbacks);
  }
  else if (S.page === 'feedback-detail') {
    const feedbacks = Object.values(S._feedbacks).flat();
    c.innerHTML = pageFeedbackDetail(feedbacks);
  }

  requestAnimationFrame(() => requestAnimationFrame(animBars));
}

// ══════════════════════════════════════════════

function scoreCards(p) {
  const sN=S.type==='all'||S.type==='NPS', sC=S.type==='all'||S.type==='CES', sT=S.type==='all'||S.type==='CSAT';
  const cols=[sN,sC,sT,true].filter(Boolean).length;
  let h='';
  if(sN) h+=`<div class="sc"><div class="sc-lbl"><span class="tbadge tb-nps">NPS</span>Net Promoter Score</div><div class="sc-val">${p.nps>0?'+':''}${p.nps}</div><div class="sc-dl ${p.nps_d>0?'d-up':p.nps_d<0?'d-dn':'d-nu'}">${p.nps_d>0?'↑':p.nps_d<0?'↓':'—'} ${Math.abs(p.nps_d)} 較上期</div><div class="sc-sub">−100 到 +100</div><div class="sc-bar" style="background:linear-gradient(90deg,#e8f0fe,#2563e8)"></div></div>`;
  if(sC) h+=`<div class="sc"><div class="sc-lbl"><span class="tbadge tb-ces">CES</span>Customer Effort Score</div><div class="sc-val">${p.ces}</div><div class="sc-dl ${p.ces_d<0?'d-up':p.ces_d>0?'d-dn':'d-nu'}">${p.ces_d<0?'↓':p.ces_d>0?'↑':'—'} ${Math.abs(p.ces_d)} 較上期</div><div class="sc-sub">1 輕鬆 → 7 費力</div><div class="sc-bar" style="background:linear-gradient(90deg,#e8f5e9,#43a047)"></div></div>`;
  if(sT) h+=`<div class="sc"><div class="sc-lbl"><span class="tbadge tb-csat">CSAT</span>滿意度</div><div class="sc-val">${p.csat}<span style="font-size:14px;color:var(--tx3)">%</span></div><div class="sc-dl ${p.csat_d>0?'d-up':p.csat_d<0?'d-dn':'d-nu'}">${p.csat_d>0?'↑':p.csat_d<0?'↓':'—'} ${Math.abs(p.csat_d)}% 較上期</div><div class="sc-sub">4–5 分計入滿意</div><div class="sc-bar" style="background:linear-gradient(90deg,#fffde7,#c6a600)"></div></div>`;
  h+=`<div class="sc"><div class="sc-lbl">📬 回收數</div><div class="sc-val">${p.resp.toLocaleString()}</div><div class="sc-dl d-up">↑ ${p.resp_d} 較上期</div><div class="sc-sub">回覆率 ${p.rate}%</div><div class="sc-bar" style="background:linear-gradient(90deg,var(--n2),var(--n5))"></div></div>`;
  return `<div class="sc-row" style="grid-template-columns:repeat(${cols},1fr)">${h}</div>`;
}

function trendChart(trend) {
  if (!trend) return '';
  const td=trend.data, labels=trend.labels;
  const n=16,W=480,H=140,pL=24,pR=8,pT=8,pB=20,iW=W-pL-pR,iH=H-pT-pB;
  const sN=S.type==='all'||S.type==='NPS', sC=S.type==='all'||S.type==='CES', sS=S.type==='all'||S.type==='CSAT';
  const norm=(a,mn,mx)=>a.map(v=>pT+iH-((v-mn)/(mx-mn||1))*iH);
  const nY=norm(td.nps,-20,80),cY=norm(td.ces,1,5),sY=norm(td.csat,60,100);
  const xP=td.nps.map((_,i)=>pL+(i/(n-1))*iW);
  const ln=y=>y.map((v,i)=>(i===0?`M${xP[i]},${v}`:`L${xP[i]},${v}`)).join(' ');
  const ar=y=>`${ln(y)} L${xP[n-1]},${pT+iH} L${pL},${pT+iH} Z`;
  let s=`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gN" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2563e8" stop-opacity=".1"/><stop offset="100%" stop-color="#2563e8" stop-opacity="0"/></linearGradient>
    <linearGradient id="gC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#43a047" stop-opacity=".1"/><stop offset="100%" stop-color="#43a047" stop-opacity="0"/></linearGradient>
    <linearGradient id="gS" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c6a600" stop-opacity=".1"/><stop offset="100%" stop-color="#c6a600" stop-opacity="0"/></linearGradient>
  </defs>`;
  for(let i=0;i<=4;i++){const y=pT+(i/4)*iH;s+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#e3e3e3" stroke-width=".5"/>`;}
  if(sN){s+=`<path d="${ar(nY)}" fill="url(#gN)"/><path d="${ln(nY)}" fill="none" stroke="#2563e8" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${xP[n-1]}" cy="${nY[n-1]}" r="2.5" fill="#2563e8"/>`;}
  if(sC){s+=`<path d="${ar(cY)}" fill="url(#gC)"/><path d="${ln(cY)}" fill="none" stroke="#43a047" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${xP[n-1]}" cy="${cY[n-1]}" r="2.5" fill="#43a047"/>`;}
  if(sS){s+=`<path d="${ar(sY)}" fill="url(#gS)"/><path d="${ln(sY)}" fill="none" stroke="#c6a600" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${xP[n-1]}" cy="${sY[n-1]}" r="2.5" fill="#c6a600"/>`;}
  labels.forEach((l,i)=>{if(i%4!==0&&i!==n-1)return;s+=`<text x="${xP[i]}" y="${H-4}" text-anchor="middle" font-size="8" fill="#b0b0b0" font-family="system-ui">${l}</text>`;});
  s+=`</svg>`;
  let leg='';
  if(sN) leg+=`<div class="li"><span class="ll" style="background:#2563e8"></span>NPS</div>`;
  if(sC) leg+=`<div class="li"><span class="ll" style="background:#43a047"></span>CES（反向）</div>`;
  if(sS) leg+=`<div class="li"><span class="ll" style="background:#c6a600"></span>CSAT %</div>`;
  return `<div class="card"><div class="ch"><span class="ct">分數趨勢</span><span class="cm">過去 ${S.range} 天</span></div>${s}<div class="chart-leg">${leg}</div></div>`;
}

function rateCard(p, fbs) {
  // 從真實回饋資料計算 NPS 分類
  const npsResps = (fbs || []).filter(f => f.type === 'NPS');
  const total = npsResps.length;
  const promoters  = total ? Math.round(npsResps.filter(f => Number(f.score) >= 9).length / total * 100) : 0;
  const passives   = total ? Math.round(npsResps.filter(f => Number(f.score) >= 7 && Number(f.score) <= 8).length / total * 100) : 0;
  const detractors = total ? Math.round(npsResps.filter(f => Number(f.score) <= 6).length / total * 100) : 0;
  const r = p.rate || 0;
  const c = 2 * Math.PI * 28;
  const f2 = (promoters / 100) * c;
  return `<div class="card"><div class="ch"><span class="ct">回覆率 & 分類</span><span class="cm">${p.resp.toLocaleString()} 份</span></div>
  <div class="cb"><div class="rate-wrap">
    <div class="rring">
      <svg viewBox="0 0 72 72"><circle cx="36" cy="36" r="28" fill="none" stroke="#e3e3e3" stroke-width="6"/>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#2563e8" stroke-width="6" stroke-dasharray="${f2} ${c-f2}" stroke-linecap="round"/></svg>
      <div class="rl">${promoters}%</div>
    </div>
    <div class="rate-bd">
      <div class="ri"><span class="ri-d" style="background:#2563e8"></span><span class="ri-n">Promoters（9–10）</span><span class="ri-v">${promoters}%</span></div>
      <div class="ri"><span class="ri-d" style="background:#c6a600"></span><span class="ri-n">Passives（7–8）</span><span class="ri-v">${passives}%</span></div>
      <div class="ri"><span class="ri-d" style="background:#d44d2e"></span><span class="ri-n">Detractors（0–6）</span><span class="ri-v">${detractors}%</span></div>
      ${total === 0 ? `<div class="ri" style="margin-top:4px;padding-top:6px;border-top:1px solid var(--bd)"><span class="ri-d" style="background:var(--n3)"></span><span class="ri-n">尚無 NPS 資料</span><span class="ri-v">—</span></div>` : ''}
    </div>
  </div></div></div>`;
}

// 從真實回饋資料計算標籤出現頻率
function tagBarsFromData(title, color, fbs, cat) {
  const npsResps = (fbs || []).filter(f => f.type === 'NPS');
  const filtered = npsResps.filter(f => {
    const s = Number(f.score);
    if (cat === 'promoter')  return s >= 9;
    if (cat === 'detractor') return s <= 6;
    return s >= 7 && s <= 8;
  });

  // 統計 tags 出現頻率
  const counts = {};
  filtered.forEach(f => {
    (f.tags || []).forEach(t => {
      if (t) counts[t] = (counts[t] || 0) + 1;
    });
  });

  const sorted = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 6);

  if (sorted.length === 0) {
    return `<div class="card"><div class="ch"><span class="ct">${title}</span><span class="cm">% 提及率</span></div><div class="empty">尚無資料</div></div>`;
  }

  const max = sorted[0][1];
  const data = sorted.map(([l, ct]) => ({ l, ct, p: Math.round(ct / max * 100) }));
  return tagBars(title, color, data);
}

function modBreakdown(mods) {
  const sN=S.type==='all'||S.type==='NPS',sC=S.type==='all'||S.type==='CES',sS=S.type==='all'||S.type==='CSAT';
  const rows=mods.map(m=>`<div class="mod-row">
    <div><div class="mod-n"><span class="tbl-link" onclick="nav({page:'module-detail',moduleId:'${m.id}'})">${m.name}</span></div><div class="mod-p">${m.path}</div></div>
    <div class="mod-scores">
      ${sN?`<div class="msv"><div class="msv-n" style="color:#2563e8">${m.nps>0?'+':''}${m.nps}</div><div class="msv-l">NPS</div></div>`:''}
      ${sN&&sC?'<div class="ms-sp"></div>':''}
      ${sC?`<div class="msv"><div class="msv-n" style="color:#43a047">${m.ces}</div><div class="msv-l">CES</div></div>`:''}
      ${(sN||sC)&&sS?'<div class="ms-sp"></div>':''}
      ${sS?`<div class="msv"><div class="msv-n" style="color:#c6a600">${m.csat}%</div><div class="msv-l">CSAT</div></div>`:''}
    </div>
    <div style="font-size:11px;color:var(--tx3);font-family:var(--m)">n=${m.n}</div>
  </div>`).join('');
  return `<div class="card"><div class="ch"><span class="ct">模組分析</span><span class="cm" style="color:var(--pri);cursor:pointer;font-weight:500" onclick="nav({page:'product',sub:'modules'})">查看全部 →</span></div><div class="cb" style="padding:0 16px">${rows}</div></div>`;
}

function recentFeedbacks(fbs, limit) {
  const data = fbs.slice(0, limit);
  const rows = data.map(f=>`<tr>
    <td style="font-family:var(--m);font-size:10px;color:var(--tx3)">${f.id}</td>
    <td><span class="tbadge tb-${f.type.toLowerCase()}">${f.type}</span></td>
    <td style="color:var(--tx3)">${f.mod}</td>
    <td><span class="spill ${f.cat==='g'?'sp-g':f.cat==='a'?'sp-a':'sp-r'}">${f.score}</span></td>
    <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.comment||'<span style="color:var(--tx3)">—</span>'}</td>
    <td style="font-size:11px;color:var(--tx3);white-space:nowrap">${f.time}</td>
    <td><button class="btn btn-sec btn-sm" onclick="nav({page:'feedback-detail',feedbackId:'${f.id}'})">查看</button></td>
  </tr>`).join('');
  return `<div class="card">
    <div class="ch"><span class="ct">最新回覆</span><span class="cm" style="color:var(--pri);cursor:pointer;font-weight:500" onclick="nav({page:'product',sub:'feedbacks'})">查看全部 →</span></div>
    <table class="tbl"><thead><tr><th>ID</th><th>類型</th><th>模組</th><th>分數</th><th>留言</th><th>時間</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function feedbackTable(fbs, drill) {
  const rows = fbs.map(f=>`<tr>
    <td style="font-family:var(--m);font-size:10px;color:var(--tx3)">${f.id}</td>
    <td><span class="tbadge tb-${f.type.toLowerCase()}">${f.type}</span></td>
    <td style="color:var(--tx3)">${f.mod}</td>
    <td><span class="spill ${f.cat==='g'?'sp-g':f.cat==='a'?'sp-a':'sp-r'}">${f.score}</span></td>
    <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.comment||'<span style="color:var(--tx3)">—</span>'}</td>
    <td>${f.tags.slice(0,2).map(t=>`<span class="tag-chip">${t}</span>`).join(' ')}</td>
    <td style="font-size:11px;color:var(--tx3);white-space:nowrap">${f.time}</td>
    ${drill?`<td><button class="btn btn-sec btn-sm" onclick="nav({page:'feedback-detail',feedbackId:'${f.id}'})">查看</button></td>`:''}
  </tr>`).join('');
  return `<div class="card">
    <table class="tbl"><thead><tr><th>ID</th><th>類型</th><th>模組</th><th>分數</th><th>留言</th><th>標籤</th><th>時間</th>${drill?'<th></th>':''}</tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function tagBars(title, color, data) {
  const bars=(data||[]).map(t=>`<div class="tbi"><div class="tbt"><span class="tbl2">${t.l}</span><span class="tbc">${t.ct}</span></div><div class="tbtr"><div class="tbf" style="background:${color}" data-pct="${t.p}"></div></div></div>`).join('');
  return `<div class="card"><div class="ch"><span class="ct">${title}</span><span class="cm">% 提及率</span></div><div class="cb"><div class="tag-bars">${bars}</div></div></div>`;
}

function stBadge(st) {
  return st==='live'?`<span class="status st-live"><span class="live-dot"></span>上線</span>`:
         st==='draft'?`<span class="status st-draft">草稿</span>`:
         `<span class="status st-paused">已暫停</span>`;
}

function scoreClass(type, score) {
  if(type==='NPS')  return score>=9?'sp-g':score>=7?'sp-a':'sp-r';
  if(type==='CES')  return score<=2?'sp-g':score<=4?'sp-a':'sp-r';
  if(type==='CSAT') return score>=4?'sp-g':score>=3?'sp-a':'sp-r';
  return 'sp-b';
}

function animBars() {
  document.querySelectorAll('.tbf[data-pct]').forEach(el => {
    requestAnimationFrame(() => { el.style.width = el.dataset.pct + '%'; });
  });
}
